<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmarttechConnect | Connexion / Inscription</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* Reset simple */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }

    .container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #4b0082;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input {
      padding: 10px 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #764ba2;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      background-color: #764ba2;
      color: white;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #667eea;
    }

    .toggle {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #555;
      cursor: pointer;
    }

    .toggle span {
      color: #764ba2;
      font-weight: 500;
    }

    .message {
      text-align: center;
      margin-bottom: 10px;
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 id="form-title">Connexion</h2>
  <div class="message" id="message"></div>

  <!-- Formulaire Connexion -->
  <form id="login-form">
    <input type="email" id="login-email" placeholder="Email" required>
    <input type="password" id="login-password" placeholder="Mot de passe" required>
    <button type="submit">Se connecter</button>
  </form>

  <!-- Formulaire Inscription -->
  <form id="register-form" style="display: none;">
    <input type="text" id="register-username" placeholder="Nom d'utilisateur" required>
    <input type="email" id="register-email" placeholder="Email" required>
    <input type="password" id="register-password" placeholder="Mot de passe" required>
    <button type="submit">S'inscrire</button>
  </form>

  <div class="toggle" id="toggle-form">
    Pas encore de compte ? <span>Inscription</span>
  </div>
</div>

<script>
  const loginForm = document.getElementById("login-form");
  const registerForm = document.getElementById("register-form");
  const toggleForm = document.getElementById("toggle-form");
  const formTitle = document.getElementById("form-title");
  const messageDiv = document.getElementById("message");

  toggleForm.addEventListener("click", () => {
    if(loginForm.style.display === "none") {
      loginForm.style.display = "flex";
      registerForm.style.display = "none";
      formTitle.textContent = "Connexion";
      toggleForm.innerHTML = 'Pas encore de compte ? <span>Inscription</span>';
      messageDiv.textContent = "";
    } else {
      loginForm.style.display = "none";
      registerForm.style.display = "flex";
      formTitle.textContent = "Inscription";
      toggleForm.innerHTML = 'Déjà un compte ? <span>Connexion</span>';
      messageDiv.textContent = "";
    }
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const text = await res.text();
    messageDiv.style.color = text === "Connecté" ? "green" : "red";
    messageDiv.textContent = text;
    if(text === "Connecté") {
      setTimeout(() => { window.location.href = "/chat.html"; }, 1000);
    }
  });

  registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("register-username").value;
    const email = document.getElementById("register-email").value;
    const password = document.getElementById("register-password").value;

    const res = await fetch("/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    })
    const text = await res.text();
    messageDiv.style.color = text === "Utilisateur créé" ? "green" : "red";
    messageDiv.textContent = text;
    if(text === "Utilisateur créé") {
      setTimeout(() => { toggleForm.click(); }, 1000);
    }
  });
</script>

</body>
</html>
