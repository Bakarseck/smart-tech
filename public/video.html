<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmarttechConnect | Appel Vidéo</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
    body { background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
    header { background: #764ba2; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: 500; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #videos { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
    video { width: 300px; height: 225px; border-radius: 10px; background: black; }
    #joinBtn { padding: 12px 25px; border: none; border-radius: 8px; background: #667eea; color: white; cursor: pointer; font-size: 16px; margin-top: 15px; }
    #joinBtn:hover { background: #5a67d8; }
  </style>
</head>
<body>
  <header>SmarttechConnect | Appel Vidéo</header>
  <main>
    <button id="joinBtn">Rejoindre l'appel</button>
    <div id="videos">
      <video id="myVideo" autoplay muted></video>
      <video id="peerVideo" autoplay></video>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <script>
    const socket = io();
    const joinBtn = document.getElementById("joinBtn");
    const myVideo = document.getElementById("myVideo");
    const peerVideo = document.getElementById("peerVideo");
    let localStream;
    let peer;

    joinBtn.addEventListener("click", async () => {
      // Désactiver le bouton après clique
      joinBtn.disabled = true;

      // Demander la caméra et micro
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        myVideo.srcObject = localStream;

        // Créer un PeerJS
        peer = new Peer(undefined, { host: '/', port: 7000, path: '/peerjs' });

        peer.on('open', id => {
          console.log('Mon Peer ID:', id);
          socket.emit('join-room', id); // On envoie l'ID au serveur si besoin
        });

        // Réception d'un appel
        peer.on('call', call => {
          call.answer(localStream);
          call.on('stream', remoteStream => {
            peerVideo.srcObject = remoteStream;
          });
        });

        // Quand un autre utilisateur se connecte
        socket.on('user-connected', userId => {
          const call = peer.call(userId, localStream);
          call.on('stream', remoteStream => {
            peerVideo.srcObject = remoteStream;
          });
        });

      } catch (err) {
        console.error('Erreur accès caméra/micro:', err);
      }
    });
  </script>
</body>
</html>
